<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeroGravity IDE - Professional Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #05080f; --panel: #0d1220; --acc: #00d4ff; --green: #00ff9d; --purple: #a855f7; --text: #e2e8f0; --border: #1e2d45; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { height: 65px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; background: var(--panel); box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 10; }
    .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--acc), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    main { display: flex; flex: 1; overflow: hidden; }
    .editor-side { width: 55%; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: #05080f; }
    .chat-side { width: 45%; display: flex; flex-direction: column; background: var(--panel); }
    .tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-weight: 800; cursor: pointer; font-size: 11px; letter-spacing: 1.5px; }
    .tab.active { color: var(--acc); background: #111827; border-bottom: 2px solid var(--acc); }
    textarea { flex: 1; background: transparent; color: #a8d8ea; border: none; padding: 25px; font-family: 'JetBrains Mono', monospace; font-size: 14px; outline: none; resize: none; line-height: 1.7; }
    .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { padding: 14px 18px; borderRadius: 16px; font-size: 14px; line-height: 1.6; max-width: 90%; border: 1px solid var(--border); }
    .msg.ai { align-self: flex-start; background: #111827; border-radius: 16px 16px 16px 4px; }
    .msg.user { align-self: flex-end; background: rgba(0, 212, 255, 0.05); color: var(--acc); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 16px 16px 4px 16px; }
    .thought { font-size: 12px; color: #64748b; font-style: italic; background: rgba(168, 85, 247, 0.07); padding: 12px; border-radius: 8px; border-left: 2px solid var(--purple); margin-bottom: 10px; }
    .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    input[type="text"], input[type="password"] { background: #111827; border: 1px solid var(--border); color: white; padding: 10px 14px; border-radius: 10px; outline: none; font-size: 13px; }
    button { cursor: pointer; border: none; border-radius: 10px; transition: 0.2s; font-weight: 800; }
    .btn-run { background: var(--green); color: #000; padding: 8px 24px; }
    .btn-analyze { background: rgba(168, 85, 247, 0.15); border: 1px solid var(--purple); color: var(--purple); padding: 8px 20px; }
    .btn-send { background: var(--acc); padding: 0 16px; font-size: 20px; }
    .upload-btn { background: var(--border); color: var(--text); padding: 8px 16px; font-size: 12px; }
    .output-screen { padding: 25px; font-family: 'JetBrains Mono', monospace; font-size: 13px; white-space: pre-wrap; overflow-y: auto; height: 100%; color: #e2e8f0; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SYSTEM_PROMPT = "Siz dunyoning eng kuchli Senior Developerisiz. Vazifangiz kodni shafqatsizlarcha tahlil qilish. <thought> ichida o'zbek tilida chuqur mulohaza qiling: mantiqiy xatolar, edge case-lar, xavfsizlik va performance haqida o'ylang. Keyin aniq xulosa bering.";

    function App() {
      const [code, setCode] = useState("// Fayl yuklang yoki kod yozing...\\nfunction demo() { console.log('ZeroGravity Ready'); }");
      const [messages, setMessages] = useState([{ role: "assistant", content: "Salom! Men Deep-Think AI yordamchingizman. Faylingizni yuklang yoki kodni joylang, men uni tanqidiy tahlil qilib xatolarini topib beraman! ⚡" }]);
      const [input, setInput] = useState("");
      const [apiKey, setApiKey] = useState("");
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState("editor");
      const [output, setOutput] = useState("");
      const chatEnd = useRef(null);
      const fileInput = useRef(null);

      useEffect(() => { chatEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { setCode(ev.target.result); setMessages(m => [...m, { role: "assistant", content: `📁 Fayl yuklandi: **\${file.name}**. Tahlil qilishga tayyorman!` }]); };
        reader.readAsText(file);
      };

      const askAI = async (custom) => {
        const val = custom || input;
        if (!val || !apiKey || loading) return;
        if (!custom) setInput("");
        setLoading(true);
        const newMsgs = [...messages, { role: "user", content: val }];
        setMessages(newMsgs);

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
            body: JSON.stringify({
              model: "claude-3-5-sonnet-20241022",
              max_tokens: 2000,
              system: SYSTEM_PROMPT,
              messages: [{ role: "user", content: `KOD: \${code}\\n\\nTOPSHIRIQ: \${val}` }]
            })
          });
          const data = await res.json();
          setMessages([...newMsgs, { role: "assistant", content: data.content[0].text }]);
        } catch (e) { setMessages([...newMsgs, { role: "assistant", content: "Xatolik: API kalitingizni tekshiring." }]); }
        finally { setLoading(false); }
      };

      const run = () => {
        setActiveTab("output"); setOutput("");
        const logs = [];
        const oldLog = console.log;
        console.log = (...a) => logs.push("› " + a.join(" "));
        try { new Function(code)(); setOutput(logs.join("\\n") || "✓ Kod muvaffaqiyatli bajarildi."); }
        catch (e) { setOutput("❌ ERROR: " + e.message); }
        finally { console.log = oldLog; }
      };

      return (
        <React.Fragment>
          <header>
            <div className="logo">◈ ZEROGRAVITY</div>
            <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
              <input type="password" placeholder="API Key (sk-...)" value={apiKey} onChange={e => setApiKey(e.target.value)} style={{ width: '160px' }} />
              <input type="file" ref={fileInput} onChange={handleFile} style={{ display: 'none' }} />
              <button className="upload-btn" onClick={() => fileInput.current.click()}>📁 Yuklash</button>
              <button className="btn-analyze" onClick={() => askAI("Ushbu kodni eng tubidagi yashirin xatolarini topib ber.")}>⚡ TAHLIL</button>
              <button className="btn-run" onClick={run}>▶ ISHGA TUSHIR</button>
            </div>
          </header>
          <main>
            <div className="editor-side">
              <div className="tabs">
                <button className={`tab \${activeTab === 'editor' ? 'active' : ''}`} onClick={() => setActiveTab('editor')}>EDITOR</button>
                <button className={`tab \${activeTab === 'output' ? 'active' : ''}`} onClick={() => setActiveTab('output')}>OUTPUT</button>
              </div>
              <div style={{ flex: 1, overflow: 'hidden' }}>
                {activeTab === 'editor' ? <textarea value={code} onChange={e => setCode(e.target.value)} spellCheck="false" /> : <div className="output-screen">{output}</div>}
              </div>
            </div>
            <div className="chat-side">
              <div style={{ padding: '12px 20px', background: 'rgba(0,0,0,0.2)', fontSize: '12px', fontWeight: 800, color: 'var(--green)' }}>AI ANALITIK (DEEP THINKING)</div>
              <div className="chat-box">
                {messages.map((m, i) => (
                  <div key={i} className={`msg \${m.role}`}>
                    {m.content.includes("<thought>") ? (
                      <div>
                        <div className="thought">🧠 Mulohaza: {m.content.split("</thought>")[0].replace("<thought>", "").trim()}</div>
                        <div style={{ whiteSpace: 'pre-wrap' }}>{m.content.split("</thought>")[1].trim()}</div>
                      </div>
                    ) : <div style={{ whiteSpace: 'pre-wrap' }}>{m.content}</div>}
                  </div>
                ))}
                {loading && <div style={{ color: 'var(--purple)', fontSize: '11px', fontStyle: 'italic' }}>AI o'ylanmoqda...</div>}
                <div ref={chatEnd} />
              </div>
              <div className="input-area">
                <input style={{ flex: 1 }} type="text" placeholder="Savol so'rang..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && askAI()} />
                <button className="btn-send" onClick={() => askAI()}>↑</button>
              </div>
            </div>
          </main>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
